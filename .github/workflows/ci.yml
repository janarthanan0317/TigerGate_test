name: TigerGate Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  TIGERGATE_API_URL: https://api.staging.tigergate.dev/api/ci

jobs:
  security-scan:
    name: TigerGate Full Repository Scan
    runs-on: ubuntu-latest

    container:
      image: tigergate/tigergate-cli:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run TigerGate Full Scan
        env:
          TIGERGATE_API_KEY: ${{ secrets.TIGERGATE_API_KEY }}
        run: |
          tigergate scan \
            --type all \
            --scan-scope auto \
            --fail-on critical,high \
            --quality-gate \
            --upload